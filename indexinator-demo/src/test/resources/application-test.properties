# Test configuration
# Testcontainers will override the datasource URL dynamically

# SQL Script Initialization
# Use static SQL files to ensure consistent schema without auto-generated indexes
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=false

# JPA/Hibernate Configuration
# Don't let Hibernate create schema - we use schema.sql instead
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
