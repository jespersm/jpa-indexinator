# PostgreSQL Database Configuration
# For demo purposes, you can run PostgreSQL locally or via Docker:
# docker run --name postgres-indexinator -e POSTGRES_PASSWORD=postgres -p 5432:5432 -d postgres:15
spring.datasource.url=jdbc:postgresql://localhost:5432/indexinator_demo
spring.datasource.username=postgres
spring.datasource.password=postgres

# SQL Script Initialization
# Use static SQL files instead of Hibernate auto-generation
# This allows us to intentionally omit indexes for demo purposes
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
# Continue on error in case schema already exists
spring.sql.init.continue-on-error=false

# JPA/Hibernate Configuration
# Don't let Hibernate create schema - we use schema.sql instead
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Application
spring.application.name=indexinator-demo
